cvm-version: 0.7.5
cpus: 8
memory: 32768

containers:
  - name: "automation"
    image: "ghcr.io/get-pally/pally-automation-enclave@sha256:0af1a2d85b1c25f7e4698049e2f91f21b947852fbf0b0a2e2847ccfe555eeb8d"
    env:
      - PORT: "8080"
      - PALLY_TINFOIL_ATTESTATION_REQUIRED: "1"
      - PALLY_TINFOIL_REPO: "tinfoilsh/confidential-model-router"
      - PALLY_TINFOIL_ATTESTATION_URL: "https://inference.tinfoil.sh/.well-known/tinfoil-attestation"
    secrets:
      - PALLY_TINFOIL_API_KEY
      - PALLY_AUTOMATION_STATE_PRIVATE_KEY_BASE64
      - PALLY_AUTOMATION_SERVICE_TOKEN
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

shim:
  upstream-port: 8080
  paths:
    - /health
    - /automation/*
