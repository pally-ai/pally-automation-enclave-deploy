cvm-version: 0.7.5
cpus: 8
memory: 16384

containers:
  - name: "automation"
    image: "ghcr.io/pally-ai/pally-automation-enclave@sha256:6b3ca7f701062270733e5bc7fa4c6dc87c7f2d9918568d427f33393d99bef875"
    env:
      - PORT: "8080"
      - PALLY_DEPLOY_TRACK: "prod"
      - PALLY_AUTOMATION_STATE_BASE_URL: "https://pally-production-go-alb-1104018926.us-east-1.elb.amazonaws.com"
      - PALLY_TINFOIL_ATTESTATION_REQUIRED: "1"
      - PALLY_TINFOIL_REPO: "tinfoilsh/confidential-model-router"
      - PALLY_TINFOIL_ATTESTATION_URL: "https://inference.tinfoil.sh/.well-known/tinfoil-attestation"
      - PALLY_TINFOIL_ATTESTATION_PINNED_DIGEST: "1ba794e680ab56e6734d32c7358a37247619f3d3e4a01c36e9df22c1651d7dbf"
      - PALLY_DEPLOY_RELEASE_TAG: "tinfoil-prod-20260423051207-6fed14ac367e"
    secrets:
      - PALLY_TINFOIL_API_KEY
      - PALLY_AUTOMATION_STATE_PRIVATE_KEY_BASE64
      - PALLY_AUTOMATION_SERVICE_TOKEN
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/python3",
          "-S",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

shim:
  upstream-port: 8080
  paths:
    - /health
    - /automation/*
